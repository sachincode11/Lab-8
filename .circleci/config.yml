version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Check Python syntax
          command: |
            python -m py_compile Activity_2.py
            python -m py_compile Activity_3.py
            python -m py_compile Activity_4.py
            python -m py_compile Activity_6.py

      - run:
          name: Run tests (optional)
          command: |
            pytest || echo "No tests yet"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build